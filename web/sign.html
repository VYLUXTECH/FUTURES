<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>FUTURES – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dancing-script@5.0.18/index.css" />
  <link href="https://fonts.bunny.net/css?family=inter:400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.04) 0%, transparent 70%);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      animation: fadeUp 0.5s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-shadow: 0 0 20px rgba(255,255,255,0.15);
    }
    .logo p {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: #888;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }
    .field { margin-bottom: 1.2rem; }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #999;
      margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%;
      padding: 0.9rem 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }
    .field input::placeholder { color: #555; }
    .forgot {
      text-align: right;
      margin-top: -0.6rem;
      margin-bottom: 1.2rem;
    }
    .forgot a {
      font-size: 0.78rem;
      color: #666;
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot a:hover { color: #bbb; }
    .error {
      color: #ff4444;
      font-size: 0.82rem;
      text-align: center;
      margin-bottom: 0.8rem;
      min-height: 1.2em;
    }
    .btn-login {
      width: 100%;
      padding: 0.95rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .footer {
      text-align: center;
      margin-top: 1.8rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.88rem;
      color: #666;
    }
    .footer a {
      color: #fff;
      font-weight: 600;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem; }
      .logo h1 { font-size: 2.6rem; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>FUTURES</h1>
      <p>Price is the only Indicator</p>
    </div>

    <form id="loginForm">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="trader@example.com" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6" />
      </div>
      <div class="forgot">
        <a href="forgot_password.html">Forgot password?</a>
      </div>
      <p class="error" id="loginError"></p>
      <button type="submit" class="btn-login" id="loginBtn">Login</button>
      <div class="footer">
        Don't have an account? <a href="signup.html">Create new account</a>
      </div>
    </form>
  </div>

  <script>
    let supabase = null;

    async function initSupabase() {
      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        supabase = window.supabase.createClient(config.supabase_url, config.supabase_key);
      } catch (e) {
        console.error('Failed to init Supabase:', e);
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      if (!supabase) {
        errorEl.textContent = 'Connecting... please retry.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';
      errorEl.textContent = '';

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Login';
        return;
      }

      window.location.href = 'dasboard.html';
    });

    initSupabase();
  </script>
</body>
</html>
